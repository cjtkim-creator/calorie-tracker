<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>5kg 감량 트래커</title>
<style>
  :root{
    --bg:#FAF7F0; --card:#FFFFFF; --border:#E6E0D2; --ink:#22291F; --muted:#7A8175;
    --green:#2F6F4E; --green-dark:#204F38; --green-light:#E7F3EA;
    --coral:#DD7A56; --coral-light:#FCECE4; --amber:#C9992E; --amber-light:#FBF1DD;
    --blue-light:#E6EEFB; --blue-dark:#3457A6; --weekend:#FDF3E7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{color:var(--ink);font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;-webkit-font-smoothing:antialiased;}
  #app{max-width:880px;margin:0 auto;padding:18px 14px 60px;}
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;}
  .brand{display:flex;align-items:center;gap:8px;}
  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-0.2px;}
  .brand .tag{font-size:11px;color:var(--muted);margin-top:1px;}
  .icon-btns{display:flex;gap:6px;}
  .gear{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .gear:hover{background:var(--green-light);}

  .datebar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px 10px;margin-bottom:14px;flex-wrap:wrap;}
  .datebar button.nav{border:none;background:var(--green-light);color:var(--green-dark);width:32px;height:32px;border-radius:9px;font-size:15px;cursor:pointer;font-weight:700;}
  .datebar .today-btn{border:1px solid var(--border);background:#fff;border-radius:9px;padding:0 10px;height:32px;font-size:12px;cursor:pointer;color:var(--ink);font-weight:600;}
  .datebar .datelabel{font-weight:800;font-size:15px;flex:1;text-align:center;min-width:120px;}
  .datebar .datelabel .wd{color:var(--coral);}
  .datebar input[type=date]{border:1px solid var(--border);border-radius:9px;padding:5px 6px;font-size:12px;color:var(--muted);background:#fff;}

  .panel{background:var(--amber-light);border:1px solid #EBD9A5;border-radius:14px;padding:14px;margin-bottom:14px;}
  .panel.db-panel{background:var(--blue-light);border-color:#C7D6F0;}
  .panel h3{margin:0 0 8px;font-size:13px;color:var(--ink);}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .settings-grid label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;}
  .settings-grid input{width:100%;padding:7px 8px;border-radius:8px;border:1px solid var(--border);font-size:13px;}
  .save-btn{margin-top:10px;background:var(--green);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .hint{font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.5;}

  .db-columns{display:flex;gap:14px;flex-wrap:wrap;}
  .db-col{flex:1;min-width:260px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;}
  .db-col-title{font-weight:800;font-size:12.5px;margin-bottom:8px;display:flex;justify-content:space-between;}
  .db-add-row{display:flex;gap:5px;margin-bottom:8px;}
  .db-add-row input[type=text]{flex:1;padding:6px 7px;border-radius:7px;border:1px solid var(--border);font-size:12px;min-width:0;}
  .db-add-row input[type=number]{width:64px;padding:6px 5px;border-radius:7px;border:1px solid var(--border);font-size:12px;}
  .db-add-row button{background:var(--blue-dark);color:#fff;border:none;border-radius:7px;padding:0 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .db-list{max-height:230px;overflow-y:auto;border-top:1px dashed var(--border);padding-top:4px;}
  .db-list::-webkit-scrollbar{width:6px;}
  .db-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .db-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px dashed var(--border);}
  .db-row:last-child{border-bottom:none;}
  .db-row .dname{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .db-row input[type=number]{width:56px;padding:4px 5px;border-radius:6px;border:1px solid var(--border);font-size:11.5px;text-align:right;}
  .db-row .u{font-size:10.5px;color:var(--muted);}
  .db-row .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;}
  .db-row .del:hover{color:var(--coral);}
  .db-empty{font-size:11.5px;color:var(--muted);padding:6px 0;}

  .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;}
  .sum-card .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .sum-card .val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;}
  .sum-card.net-neg{background:var(--green-light);}
  .sum-card.net-neg .val{color:var(--green-dark);}
  .sum-card.net-pos{background:var(--coral-light);}
  .sum-card.net-pos .val{color:var(--coral);}
  .sum-card .sub{font-size:10px;color:var(--muted);margin-top:2px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
  .card h2{font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(max-width:600px){.meal-grid{grid-template-columns:1fr;} .settings-grid{grid-template-columns:1fr;} .summary-grid{grid-template-columns:1fr;}}

  .meal-box{border:1px solid var(--border);border-radius:12px;padding:10px;background:#FDFCFA;}
  .meal-box .mtitle{font-size:12.5px;font-weight:700;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
  .meal-box .mtitle .subtotal{font-size:11px;color:var(--muted);font-weight:600;}
  .add-row{display:flex;gap:6px;margin-bottom:8px;}
  .add-row input[type=text]{flex:1;padding:7px 9px;border-radius:8px;border:1px solid var(--border);font-size:12.5px;min-width:0;}
  .add-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:0 12px;font-size:12.5px;cursor:pointer;font-weight:700;white-space:nowrap;}
  .item-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px dashed var(--border);}
  .item-row:last-child{border-bottom:none;}
  .item-row .txt{flex:1;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item-row input[type=number]{width:56px;padding:4px 5px;border-radius:6px;border:1px solid var(--border);font-size:12px;text-align:right;}
  .item-row .kcal-unit{font-size:11px;color:var(--muted);}
  .item-row .src-badge{font-size:9px;padding:1px 5px;border-radius:5px;font-weight:700;white-space:nowrap;}
  .item-row .src-db{background:var(--green-light);color:var(--green-dark);}
  .item-row .src-manual{background:var(--coral-light);color:var(--coral);}
  .item-row .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 4px;}
  .item-row .del:hover{color:var(--coral);}
  .empty-note{font-size:11.5px;color:var(--muted);padding:4px 0;}

  .activity-row{display:flex;gap:10px;flex-wrap:wrap;}
  .activity-box{flex:1;min-width:150px;border:1px solid var(--border);border-radius:12px;padding:10px;background:#FDFCFA;}
  .activity-box .lbl{font-size:12px;font-weight:700;margin-bottom:6px;}
  .activity-box .row2{display:flex;align-items:center;gap:8px;}
  .activity-box input[type=number]{width:100%;max-width:120px;padding:6px 8px;border-radius:8px;border:1px solid var(--border);font-size:13px;}
  .activity-box .kcal-out{font-size:11.5px;color:var(--muted);}
  .baseline-static{font-size:18px;font-weight:800;color:var(--green-dark);}
  .baseline-note{font-size:10.5px;color:var(--muted);margin-top:4px;}

  table.week{width:100%;border-collapse:collapse;font-size:11.5px;}
  table.week th,table.week td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--border);}
  table.week th{color:var(--muted);font-weight:700;font-size:10.5px;}
  table.week tr.weekend td{background:var(--weekend);}
  table.week tr.istoday td{background:var(--green-light);font-weight:800;}
  table.week td.wd{font-weight:800;}
  table.week td.net-neg{color:var(--green-dark);font-weight:700;}
  table.week td.net-pos{color:var(--coral);font-weight:700;}
  table.week td.nodata{color:#C6CBC1;font-style:italic;}

  .progress-wrap{margin-top:12px;}
  .progress-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px;}
  .progress-label b{font-weight:800;}
  .progress-bar{height:10px;background:#EFEBE0;border-radius:6px;overflow:hidden;margin-bottom:12px;}
  .progress-fill{height:100%;border-radius:6px;background:var(--green);transition:width .4s ease;}
  .week-footer-note{font-size:11px;color:var(--muted);margin-top:2px;}

  .net-neg{color:var(--green-dark);}
  .net-pos{color:var(--coral);}
  .err-banner{background:var(--coral-light);border:1px solid #F0C7B4;color:var(--coral);padding:8px 10px;border-radius:10px;font-size:11.5px;margin-bottom:12px;}
  .storage-note{font-size:10.5px;color:var(--muted);text-align:center;margin-top:18px;line-height:1.6;}
</style>
</head>
<body>
<div id="app">불러오는 중…</div>

<script>
/* ============================================================
   5kg 감량 트래커 — 독립 실행형(Claude 밖, 크롬 등에서 사용)
   저장: 브라우저 localStorage (이 브라우저/기기에만 저장됨)
   칼로리: 음식/운동 DB를 앱 안에서 직접 추가·관리 가능
   ============================================================ */

const DEFAULT_SETTINGS = { activityBaseline: 2100, weeklyCalTarget: -6070, weeklyKgTarget: 0.79, stepsKcalFactor: 0.045 };
const MEAL_TYPES = [
  { key:'breakfast', label:'🍏 아침' }, { key:'lunch', label:'🥗 점심' },
  { key:'snack', label:'🥛 간식' }, { key:'dinner', label:'🥩 저녁 & 술자리' },
];
const WD = ['일','월','화','수','목','금','토'];

/* ---------------- 기본 시드 데이터 (최초 1회만 저장소에 심어짐) ---------------- */
const FOOD_DB_SEED = [
  { name:'사과 1개(중)', kcal:95 }, { name:'당근 1개(중)', kcal:25 }, { name:'삶은 달걀 1개', kcal:70 },
  { name:'샐러드팩(야채+드레싱)', kcal:150 }, { name:'무가당 두유 1팩', kcal:90 }, { name:'공깃밥 1공기', kcal:300 },
  { name:'고기 반찬 1인분(제육/불고기 등)', kcal:350 }, { name:'기본 반찬 한 접시(나물/김치 등)', kcal:40 },
  { name:'소주 1병', kcal:400 }, { name:'맥주 1캔/1잔', kcal:230 }, { name:'막걸리 1병', kcal:350 }, { name:'와인 1잔', kcal:125 },
  { name:'치킨(후라이드) 1조각', kcal:250 }, { name:'삼겹살 200g', kcal:600 }, { name:'에너지바 1개', kcal:200 },
  { name:'생선구이 1마리', kcal:250 }, { name:'족발 1인분', kcal:700 }, { name:'돼지보쌈 1인분', kcal:550 },
  { name:'떡볶이', kcal:400 }, { name:'마라탕 1인분', kcal:650 }, { name:'오징어보쌈 1인분', kcal:450 },
  { name:'양주 1병', kcal:1550 }, { name:'고량주 1병', kcal:1600 }, { name:'회 2인분', kcal:350 },
  { name:'회덮밥 1인분', kcal:550 }, { name:'물회 1인분', kcal:450 }, { name:'냉채족발 1인분', kcal:450 },
  { name:'돼지국밥 1인분', kcal:550 }, { name:'순대국밥 1인분', kcal:600 }, { name:'해장국 1인분', kcal:450 },
  { name:'돼지수육 1인분', kcal:500 }, { name:'소고기 육회 1인분', kcal:250 }, { name:'소고기 등심구이 200g', kcal:500 },
  { name:'삼계탕 1인분', kcal:800 }, { name:'자두 1개', kcal:30 }, { name:'복숭아 1개', kcal:60 },
  { name:'수박 3조각', kcal:90 }, { name:'기타과일 1개', kcal:60 }, { name:'새우깡 1봉지', kcal:470 },
  { name:'짱구 1봉지', kcal:430 }, { name:'순두부찌개 1인분', kcal:350 }, { name:'청국장찌개 1인분', kcal:350 },
  { name:'두부김치 200g', kcal:350 }, { name:'소시지 200g', kcal:560 }, { name:'부대찌개 1인분', kcal:650 },
  { name:'마른안주 1인분', kcal:250 }, { name:'돼지갈비 200g', kcal:550 }, { name:'김치전 100g', kcal:250 },
  { name:'모듬전 100g', kcal:230 }, { name:'홍어삼합 200g', kcal:350 }, { name:'닭꼬치 1개', kcal:150 },
  { name:'양꼬치 1개', kcal:80 }, { name:'짜장면 1인분', kcal:700 }, { name:'짬뽕 1인분', kcal:600 },
  { name:'볶음밥 1인분', kcal:600 }, { name:'파스타 1인분', kcal:600 }, { name:'국수 1인분', kcal:450 },
  { name:'라면 1개', kcal:500 }, { name:'비빔밥 1인분', kcal:550 }, { name:'떡국 1인분', kcal:450 },
  { name:'커피 1컵', kcal:10 }, { name:'우유 1컵', kcal:130 },
];

const EXERCISE_DB_SEED = [
  { name:'로잉머신 20분', kcal:180 }, { name:'스피닝 바이크 30분(인터벌)', kcal:320 },
  { name:'아령 어깨 운동 20분', kcal:100 }, { name:'AB슬라이드 3세트', kcal:30 },
  { name:'배드민턴 1시간', kcal:400 }, { name:'수영 30분', kcal:300 },
  { name:'걷기 30분', kcal:120 }, { name:'걷기 1000보 추가', kcal:40 },
  { name:'러닝(조깅) 30분', kcal:300 }, { name:'러닝 5km', kcal:350 },
  { name:'자전거 30분', kcal:250 }, { name:'요가 1시간', kcal:180 },
  { name:'필라테스 1시간', kcal:200 }, { name:'웨이트 트레이닝 1시간', kcal:300 },
  { name:'스쿼트 30개(3세트)', kcal:30 }, { name:'계단 오르기 10분', kcal:100 },
  { name:'등산 2시간', kcal:700 }, { name:'훌라후프 15분', kcal:100 },
  { name:'줄넘기 10분', kcal:120 }, { name:'축구 1시간', kcal:500 },
  { name:'농구 1시간', kcal:500 }, { name:'테니스 1시간', kcal:400 },
  { name:'탁구 1시간', kcal:250 }, { name:'골프(필드) 18홀', kcal:400 },
  { name:'스크린골프 1시간', kcal:150 }, { name:'가벼운 산책 30분', kcal:90 },
];

function normalizeName(s){
  return String(s).replace(/\([^)]*\)/g,'').replace(/[0-9]+(\.[0-9]+)?/g,'')
    .replace(/(개|병|컵|봉지|인분|마리|잔|조각|공기|그램|밀리리터|시간|시|분|초|km|킬로미터|걸음|바퀴|회|세트|홀|g|ml|kg|팩|캔|접시)/g,'')
    .replace(/\s+/g,'').toLowerCase();
}
function findInDB(list, text){
  const norm = normalizeName(text);
  if(!norm) return null;
  for(const item of list){ if(normalizeName(item.name)===norm) return item; }
  let best=null, bestLen=0;
  for(const item of list){
    const dnorm = normalizeName(item.name);
    if(dnorm.length>=2 && (norm.includes(dnorm) || dnorm.includes(norm))){
      if(dnorm.length>bestLen){ best=item; bestLen=dnorm.length; }
    }
  }
  return best;
}

/* ---------------- 상태 ---------------- */
let state = {
  settings: { ...DEFAULT_SETTINGS },
  foodDB: [], exerciseDB: [],
  currentDate: new Date(),
  currentLog: emptyLog(),
  weekData: [], bodyHistory: [],
  settingsOpen: false, dbOpen: false,
  errorMsg: null,
};

function emptyLog(){
  return { meals:{ breakfast:[], lunch:[], snack:[], dinner:[] }, exercises:[], steps:0, weightMorning:null, waistCm:null };
}
function uid(){ return Date.now()+'-'+Math.random().toString(36).slice(2); }

/* ---------------- localStorage 헬퍼 ---------------- */
function storageGet(key){ try{ return localStorage.getItem(key); }catch(e){ return null; } }
function storageSet(key, value){
  try{ localStorage.setItem(key, value); return true; }
  catch(e){ state.errorMsg = '브라우저 저장에 실패했어요. 시크릿 모드이거나 저장 공간이 부족할 수 있어요.'; return false; }
}
function storageListPrefix(prefix){
  const keys = [];
  for(let i=0;i<localStorage.length;i++){ const k = localStorage.key(i); if(k && k.startsWith(prefix)) keys.push(k); }
  return keys;
}

function loadSettings(){
  const v = storageGet('settings');
  if(!v) return { ...DEFAULT_SETTINGS };
  try{ return { ...DEFAULT_SETTINGS, ...JSON.parse(v) }; }catch(e){ return { ...DEFAULT_SETTINGS }; }
}
function loadOrSeedDB(key, seed){
  const v = storageGet(key);
  if(v){ try{ const parsed = JSON.parse(v); if(Array.isArray(parsed) && parsed.length) return parsed; }catch(e){} }
  const seeded = seed.map(f=>({ id:uid(), name:f.name, kcal:f.kcal }));
  storageSet(key, JSON.stringify(seeded));
  return seeded;
}
function loadLog(dateKey){
  const v = storageGet('log:'+dateKey);
  if(!v) return emptyLog();
  try{
    const p = JSON.parse(v);
    return {
      meals: { breakfast:[], lunch:[], snack:[], dinner:[], ...(p.meals||{}) },
      exercises: p.exercises || [], steps: p.steps || 0,
      weightMorning: (p.weightMorning===0 || p.weightMorning) ? Number(p.weightMorning) : null,
      waistCm: (p.waistCm===0 || p.waistCm) ? Number(p.waistCm) : null,
    };
  }catch(e){ return emptyLog(); }
}
function saveLog(dateKey, log){ storageSet('log:'+dateKey, JSON.stringify(log)); }

/* ---------------- 날짜 유틸 ---------------- */
function dateKey(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${day}`; }
function mondayOf(d){ const date=new Date(d); const day=date.getDay(); const diff=(day+6)%7; date.setDate(date.getDate()-diff); date.setHours(0,0,0,0); return date; }
function sameDay(a,b){ return dateKey(a)===dateKey(b); }

/* ---------------- 칼로리 계산 ---------------- */
function computeTotals(log, settings){
  const mealSum = arr => (arr||[]).reduce((s,i)=>s+(Number(i.kcal)||0),0);
  const intake = MEAL_TYPES.reduce((s,m)=>s+mealSum(log.meals[m.key]),0);
  const exerciseBurn = (log.exercises||[]).reduce((s,i)=>s+(Number(i.kcal)||0),0);
  const stepsBurn = Math.round((log.steps||0) * settings.stepsKcalFactor);
  const burn = exerciseBurn + stepsBurn + Number(settings.activityBaseline||0);
  const net = intake - burn;
  return { intake, exerciseBurn, stepsBurn, burn, net };
}
function hasAnyData(log){
  return (log.steps>0) || MEAL_TYPES.some(m=>(log.meals[m.key]||[]).length>0) || (log.exercises||[]).length>0;
}
function loadWeekData(refDate, settings){
  const monday = mondayOf(refDate);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const key = dateKey(d);
    const log = loadLog(key);
    days.push({ date:d, key, weekday:WD[d.getDay()], totals: computeTotals(log, settings), hasData: hasAnyData(log), weightMorning: log.weightMorning, waistCm: log.waistCm });
  }
  return days;
}
function loadBodyHistory(){
  const keys = storageListPrefix('log:');
  const entries = [];
  for(const k of keys){
    const v = storageGet(k);
    if(!v) continue;
    try{
      const p = JSON.parse(v);
      const hasW = p.weightMorning===0 || p.weightMorning;
      const hasWa = p.waistCm===0 || p.waistCm;
      if(hasW || hasWa){ entries.push({ date: k.slice(4), weight: hasW?Number(p.weightMorning):null, waist: hasWa?Number(p.waistCm):null }); }
    }catch(e){}
  }
  entries.sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0));
  return entries;
}

/* ---------------- 데이터 변경 액션 ---------------- */
function refreshDay(){
  const key = dateKey(state.currentDate);
  state.currentLog = loadLog(key);
  state.weekData = loadWeekData(state.currentDate, state.settings);
  state.bodyHistory = loadBodyHistory();
}
function saveAndRefresh(){
  saveLog(dateKey(state.currentDate), state.currentLog);
  state.weekData = loadWeekData(state.currentDate, state.settings);
  state.bodyHistory = loadBodyHistory();
  render();
}

function navDate(delta){ const d=new Date(state.currentDate); d.setDate(d.getDate()+delta); state.currentDate=d; refreshDay(); render(); }
function jumpToday(){ state.currentDate=new Date(); refreshDay(); render(); }
function onDatePick(v){ if(!v) return; state.currentDate=new Date(v+'T00:00:00'); refreshDay(); render(); }

function addMealItem(mealKey){
  const el = document.getElementById('add-input-'+mealKey);
  const text = el.value; el.value='';
  if(!text.trim()) return;
  const dbHit = findInDB(state.foodDB, text.trim());
  const item = dbHit
    ? { id:uid(), text:text.trim(), kcal:dbHit.kcal, source:'db' }
    : { id:uid(), text:text.trim(), kcal:0, source:'manual' };
  state.currentLog.meals[mealKey].push(item);
  saveAndRefresh();
}
function addExerciseItem(){
  const el = document.getElementById('add-input-exercise');
  const text = el.value; el.value='';
  if(!text.trim()) return;
  const dbHit = findInDB(state.exerciseDB, text.trim());
  const item = dbHit
    ? { id:uid(), text:text.trim(), kcal:dbHit.kcal, source:'db' }
    : { id:uid(), text:text.trim(), kcal:0, source:'manual' };
  state.currentLog.exercises.push(item);
  saveAndRefresh();
}
function removeItem(kind, mealKey, id){
  if(kind==='food'){ state.currentLog.meals[mealKey] = state.currentLog.meals[mealKey].filter(i=>i.id!==id); }
  else { state.currentLog.exercises = state.currentLog.exercises.filter(i=>i.id!==id); }
  saveAndRefresh();
}
function updateItemKcal(kind, mealKey, id, value){
  const arr = kind==='food' ? state.currentLog.meals[mealKey] : state.currentLog.exercises;
  const it = arr.find(i=>i.id===id);
  if(it){ it.kcal = Number(value)||0; it.source='manual'; }
  saveAndRefresh();
}
function updateSteps(value){ state.currentLog.steps = Math.max(0, Number(value)||0); saveAndRefresh(); }
function updateWeight(value){ const v=value===''?null:Number(value); state.currentLog.weightMorning=(v===null||isNaN(v))?null:v; saveAndRefresh(); }
function updateWaist(value){ const v=value===''?null:Number(value); state.currentLog.waistCm=(v===null||isNaN(v))?null:v; saveAndRefresh(); }

function toggleSettings(){ state.settingsOpen=!state.settingsOpen; state.dbOpen=false; render(); }
function toggleDB(){ state.dbOpen=!state.dbOpen; state.settingsOpen=false; render(); }
function saveSettingsForm(){
  const g = id => Number(document.getElementById(id).value);
  state.settings = {
    activityBaseline: g('set-activity') || DEFAULT_SETTINGS.activityBaseline,
    weeklyCalTarget: g('set-calTarget'),
    weeklyKgTarget: g('set-kgTarget') || DEFAULT_SETTINGS.weeklyKgTarget,
    stepsKcalFactor: g('set-stepsFactor') || DEFAULT_SETTINGS.stepsKcalFactor,
  };
  storageSet('settings', JSON.stringify(state.settings));
  state.settingsOpen = false;
  refreshDay(); render();
}

/* ---------------- DB 관리 액션 ---------------- */
function addDBEntry(kind){
  const nameEl = document.getElementById('new-'+kind+'-name');
  const kcalEl = document.getElementById('new-'+kind+'-kcal');
  const name = nameEl.value.trim();
  const kcal = Number(kcalEl.value);
  if(!name || !kcal) return;
  const list = kind==='food' ? state.foodDB : state.exerciseDB;
  list.push({ id:uid(), name, kcal });
  list.sort((a,b)=> a.name.localeCompare(b.name, 'ko'));
  nameEl.value=''; kcalEl.value='';
  saveDB(kind); render();
}
function updateDBEntryKcal(kind, id, value){
  const list = kind==='food' ? state.foodDB : state.exerciseDB;
  const it = list.find(i=>i.id===id);
  if(it) it.kcal = Number(value)||0;
  saveDB(kind); render();
}
function deleteDBEntry(kind, id){
  if(kind==='food'){ state.foodDB = state.foodDB.filter(i=>i.id!==id); }
  else { state.exerciseDB = state.exerciseDB.filter(i=>i.id!==id); }
  saveDB(kind); render();
}
function saveDB(kind){
  if(kind==='food') storageSet('foodDB', JSON.stringify(state.foodDB));
  else storageSet('exerciseDB', JSON.stringify(state.exerciseDB));
}

/* ---------------- 렌더링 ---------------- */
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function sourceBadge(source){
  if(source==='db') return '<span class="src-badge src-db">DB</span>';
  return '<span class="src-badge src-manual">직접입력</span>';
}
function itemRowHTML(kind, mealKey, item){
  return `
  <div class="item-row">
    <span class="txt" title="${escapeHtml(item.text)}">${escapeHtml(item.text)}</span>
    ${sourceBadge(item.source)}
    <input type="number" value="${item.kcal}" onchange="updateItemKcal('${kind}', ${mealKey?`'${mealKey}'`:null}, '${item.id}', this.value)">
    <span class="kcal-unit">kcal</span>
    <button class="del" onclick="removeItem('${kind}', ${mealKey?`'${mealKey}'`:null}, '${item.id}')">✕</button>
  </div>`;
}
function mealBoxHTML(m){
  const items = state.currentLog.meals[m.key] || [];
  const subtotal = items.reduce((s,i)=>s+(Number(i.kcal)||0),0);
  return `
  <div class="meal-box">
    <div class="mtitle"><span>${m.label}</span><span class="subtotal">${subtotal} kcal</span></div>
    <div class="add-row">
      <input type="text" id="add-input-${m.key}" placeholder="예: 사과 1개, 삶은 계란 2개" onkeydown="if(event.key==='Enter'){addMealItem('${m.key}')}">
      <button onclick="addMealItem('${m.key}')">추가</button>
    </div>
    ${items.length===0 ? '<div class="empty-note">아직 입력한 음식이 없어요.</div>' : items.map(i=>itemRowHTML('food', m.key, i)).join('')}
  </div>`;
}
function exerciseBoxHTML(){
  const items = state.currentLog.exercises || [];
  const subtotal = items.reduce((s,i)=>s+(Number(i.kcal)||0),0);
  return `
  <div class="meal-box" style="margin-bottom:10px;">
    <div class="mtitle"><span>🏋 오늘의 운동</span><span class="subtotal">${subtotal} kcal</span></div>
    <div class="add-row">
      <input type="text" id="add-input-exercise" placeholder="예: 로잉머신 20분" onkeydown="if(event.key==='Enter'){addExerciseItem()}">
      <button onclick="addExerciseItem()">추가</button>
    </div>
    ${items.length===0 ? '<div class="empty-note">아직 입력한 운동이 없어요.</div>' : items.map(i=>itemRowHTML('exercise', null, i)).join('')}
  </div>`;
}
function weekTableRows(){
  return state.weekData.map(d=>{
    const isToday = sameDay(d.date, state.currentDate);
    const isWeekend = d.weekday==='토' || d.weekday==='일';
    const cls = [isWeekend?'weekend':'', isToday?'istoday':''].join(' ').trim();
    const netCls = d.totals.net<0?'net-neg':'net-pos';
    const wCell = (d.weightMorning||d.weightMorning===0) ? `${d.weightMorning}kg` : `<span class="nodata">-</span>`;
    const waCell = (d.waistCm||d.waistCm===0) ? `${d.waistCm}cm` : `<span class="nodata">-</span>`;
    if(!d.hasData){
      return `<tr class="${cls}"><td class="wd">${d.weekday}</td><td>${d.date.getMonth()+1}/${d.date.getDate()}</td>
        <td class="nodata">-</td><td class="nodata">-</td><td class="nodata">-</td><td>${wCell}</td><td>${waCell}</td></tr>`;
    }
    return `<tr class="${cls}"><td class="wd">${d.weekday}</td><td>${d.date.getMonth()+1}/${d.date.getDate()}</td>
      <td>${d.totals.intake}</td><td>${d.totals.burn}</td><td class="${netCls}">${d.totals.net>0?'+':''}${d.totals.net}</td><td>${wCell}</td><td>${waCell}</td></tr>`;
  }).join('');
}
function metricChartSVG(history, field, color){
  const pts = history.filter(e=>e[field]!=null);
  if(pts.length<2) return '';
  const W=300,H=60,PAD=10;
  const vals = pts.map(p=>p[field]);
  const min=Math.min(...vals), max=Math.max(...vals);
  const range=(max-min)||1;
  const stepX=(W-2*PAD)/(pts.length-1);
  const coords = pts.map((p,i)=>({x:PAD+i*stepX, y:PAD+(1-(p[field]-min)/range)*(H-2*PAD)}));
  const poly = coords.map(c=>`${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const circles = coords.map((c,i)=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${i===coords.length-1?3.5:2}" fill="${i===coords.length-1?'#DD7A56':color}"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;margin-top:6px;"><polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2"/>${circles}</svg>`;
}
function metricStatsHTML(history, field, unit, label){
  const pts = history.filter(e=>e[field]!=null);
  if(pts.length===0) return `<div class="activity-box"><div class="lbl">${label}</div><div class="empty-note">아직 기록이 없어요.</div></div>`;
  const start = pts[0][field], latest = pts[pts.length-1][field];
  const delta = latest-start;
  const cls = delta<0?'net-neg':(delta>0?'net-pos':'');
  return `<div class="activity-box">
    <div class="lbl">${label} (총 ${pts.length}회)</div>
    <div style="font-size:13px;">시작 <b>${start}${unit}</b> → 최근 <b>${latest}${unit}</b></div>
    <div class="${cls}" style="font-size:15px;font-weight:800;margin-top:2px;">${delta>0?'+':''}${delta.toFixed(1)}${unit}</div>
  </div>`;
}
function dbRowHTML(kind, entry){
  return `
  <div class="db-row">
    <span class="dname" title="${escapeHtml(entry.name)}">${escapeHtml(entry.name)}</span>
    <input type="number" value="${entry.kcal}" onchange="updateDBEntryKcal('${kind}', '${entry.id}', this.value)">
    <span class="u">kcal</span>
    <button class="del" onclick="deleteDBEntry('${kind}', '${entry.id}')">✕</button>
  </div>`;
}
function dbColumnHTML(kind, title, list){
  return `
  <div class="db-col">
    <div class="db-col-title"><span>${title}</span><span style="color:var(--muted);font-weight:600;">${list.length}개</span></div>
    <div class="db-add-row">
      <input type="text" id="new-${kind}-name" placeholder="이름">
      <input type="number" id="new-${kind}-kcal" placeholder="kcal">
      <button onclick="addDBEntry('${kind}')">추가</button>
    </div>
    <div class="db-list">
      ${list.length===0 ? '<div class="db-empty">항목이 없어요.</div>' : list.map(e=>dbRowHTML(kind, e)).join('')}
    </div>
  </div>`;
}

function render(){
  const app = document.getElementById('app');
  const s = state.settings;
  const totals = computeTotals(state.currentLog, s);
  const netClass = totals.net<0?'net-neg':'net-pos';
  const wd = WD[state.currentDate.getDay()];
  const isToday = sameDay(state.currentDate, new Date());

  const loggedDays = state.weekData.filter(d=>d.hasData);
  const weeklyNet = loggedDays.reduce((sum,d)=>sum+d.totals.net,0);
  const kgLoss = -weeklyNet/7700;
  const calPct = s.weeklyCalTarget ? Math.round((weeklyNet/s.weeklyCalTarget)*100) : 0;
  const kgPct = s.weeklyKgTarget ? Math.round((kgLoss/s.weeklyKgTarget)*100) : 0;

  app.innerHTML = `
    <div class="top">
      <div class="brand">
        <div class="logo">🔥</div>
        <div><h1>5kg 감량 트래커</h1><div class="tag">오늘 먹고 움직인 만큼, 자동으로 계산돼요</div></div>
      </div>
      <div class="icon-btns">
        <button class="gear" onclick="toggleDB()" title="음식·운동 DB 관리">📚</button>
        <button class="gear" onclick="toggleSettings()" title="설정">⚙️</button>
      </div>
    </div>

    ${state.dbOpen ? `
    <div class="panel db-panel">
      <h3>📚 나의 음식 · 운동 데이터베이스 관리</h3>
      <div class="db-columns">
        ${dbColumnHTML('food', '🍽 음식 DB', state.foodDB)}
        ${dbColumnHTML('exercise', '🏃 운동 DB', state.exerciseDB)}
      </div>
      <div class="hint">여기서 추가/수정/삭제한 내용은 바로 저장돼요. 자주 드시는 음식이나 하시는 운동을 계속 추가해두시면, 다음부터 입력할 때 이름만 쳐도 칼로리가 자동으로 채워져요.</div>
    </div>` : ''}

    ${state.settingsOpen ? `
    <div class="panel">
      <h3>⚙️ 계산 기준 설정</h3>
      <div class="settings-grid">
        <div><label>활동대사 (기초대사+비운동활동, kcal/일)</label><input type="number" id="set-activity" value="${s.activityBaseline}"></div>
        <div><label>걸음당 소모 칼로리 (kcal/걸음)</label><input type="number" step="0.001" id="set-stepsFactor" value="${s.stepsKcalFactor}"></div>
        <div><label>주간 목표 잔여칼로리 (음수, kcal)</label><input type="number" id="set-calTarget" value="${s.weeklyCalTarget}"></div>
        <div><label>주간 목표 감량 (kg)</label><input type="number" step="0.01" id="set-kgTarget" value="${s.weeklyKgTarget}"></div>
      </div>
      <button class="save-btn" onclick="saveSettingsForm()">저장</button>
      <div class="hint">이 설정과 모든 기록은 지금 이 브라우저(기기)에만 저장돼요.</div>
    </div>` : ''}

    ${state.errorMsg ? `<div class="err-banner">⚠️ ${state.errorMsg}</div>` : ''}

    <div class="datebar">
      <button class="nav" onclick="navDate(-1)">◀</button>
      <div class="datelabel">${state.currentDate.getMonth()+1}월 ${state.currentDate.getDate()}일 <span class="wd">(${wd})</span>${isToday?' · 오늘':''}</div>
      <button class="nav" onclick="navDate(1)">▶</button>
      <button class="today-btn" onclick="jumpToday()">오늘로</button>
      <input type="date" value="${dateKey(state.currentDate)}" onchange="onDatePick(this.value)">
    </div>

    <div class="card">
      <h2>⚖️ 오늘 아침 체중 &amp; 허리둘레</h2>
      <div class="activity-row">
        <div class="activity-box" style="flex:0 0 auto;min-width:130px;">
          <div class="lbl">체중(kg)</div>
          <input type="number" step="0.1" min="0" placeholder="예: 75.4" value="${state.currentLog.weightMorning ?? ''}" onchange="updateWeight(this.value)">
        </div>
        <div class="activity-box" style="flex:0 0 auto;min-width:130px;">
          <div class="lbl">허리둘레(cm)</div>
          <input type="number" step="0.1" min="0" placeholder="예: 88.0" value="${state.currentLog.waistCm ?? ''}" onchange="updateWaist(this.value)">
        </div>
      </div>
      <div class="activity-row" style="margin-top:8px;">
        ${metricStatsHTML(state.bodyHistory,'weight','kg','📉 체중 변화')}
        ${metricStatsHTML(state.bodyHistory,'waist','cm','📏 허리둘레 변화')}
      </div>
      ${metricChartSVG(state.bodyHistory,'weight','#2F6F4E')}
      ${metricChartSVG(state.bodyHistory,'waist','#3457A6')}
    </div>

    <div class="summary-grid">
      <div class="sum-card"><div class="lbl">🍽 흡수 칼로리</div><div class="val">${totals.intake}</div><div class="sub">식사 총합</div></div>
      <div class="sum-card"><div class="lbl">🔥 소비 칼로리</div><div class="val">${totals.burn}</div><div class="sub">운동+걸음+활동대사</div></div>
      <div class="sum-card ${netClass}"><div class="lbl">⚖️ 잔여 칼로리</div><div class="val">${totals.net>0?'+':''}${totals.net}</div><div class="sub">${totals.net<0?'↓ 감소 방향':'↑ 적자 아님'}</div></div>
    </div>

    <div class="card">
      <h2>🍽 오늘의 식사</h2>
      <div class="meal-grid">${MEAL_TYPES.map(m=>mealBoxHTML(m)).join('')}</div>
    </div>

    <div class="card">
      <h2>🏃 운동 &amp; 활동</h2>
      ${exerciseBoxHTML()}
      <div class="activity-row">
        <div class="activity-box">
          <div class="lbl">🚶 오늘 걸음수</div>
          <div class="row2">
            <input type="number" min="0" step="100" value="${state.currentLog.steps}" onchange="updateSteps(this.value)">
            <span class="kcal-out">≈ ${totals.stepsBurn} kcal</span>
          </div>
        </div>
        <div class="activity-box">
          <div class="lbl">🧍 활동대사 (기초대사+비운동)</div>
          <div class="baseline-static">${s.activityBaseline} kcal</div>
          <div class="baseline-note">설정(⚙️)에서 조정할 수 있어요</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📅 이번 주 현황 <span style="font-weight:400;color:var(--muted);font-size:11.5px;">(${loggedDays.length}/7일 입력됨)</span></h2>
      <table class="week">
        <thead><tr><th>요일</th><th>날짜</th><th>흡수</th><th>소비</th><th>잔여</th><th>체중</th><th>허리</th></tr></thead>
        <tbody>${weekTableRows()}</tbody>
      </table>
      ${loggedDays.length>0 ? `
      <div class="progress-wrap">
        <div class="progress-label"><span>🔥 칼로리 목표 달성률</span><b>${calPct}%</b></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,calPct))}%"></div></div>
        <div class="progress-label"><span>⚖️ 예상 감량 달성률</span><b>${kgPct}% (${kgLoss.toFixed(2)}kg / 목표 ${s.weeklyKgTarget}kg)</b></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,kgPct))}%"></div></div>
        <div class="week-footer-note">주간 잔여 칼로리 합계: ${weeklyNet} kcal (목표 ${s.weeklyCalTarget} kcal 대비, 입력된 ${loggedDays.length}일 기준)</div>
      </div>` : `<div class="empty-note" style="margin-top:10px;">이번 주에 아직 입력된 날이 없어요.</div>`}
    </div>

    <div class="storage-note">💾 모든 기록·DB는 이 브라우저(기기)에만 저장돼요. 다른 브라우저·다른 기기에서 열면 기록이 보이지 않아요.<br>기기 간 동기화는 다음 업데이트(구글 드라이브 연동)에서 추가될 예정입니다.</div>
  `;
}

/* ---------------- 초기화 ---------------- */
function init(){
  state.settings = loadSettings();
  state.foodDB = loadOrSeedDB('foodDB', FOOD_DB_SEED);
  state.exerciseDB = loadOrSeedDB('exerciseDB', EXERCISE_DB_SEED);
  refreshDay();
  render();
}
init();
</script>
</body>
</html>
