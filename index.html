  .brand .logo{width:34px;height:34px;border-radius:9px;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:18px;}
  .brand h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-0.2px;}
  .brand .tag{font-size:11px;color:var(--muted);margin-top:1px;}
  .icon-btns{display:flex;gap:6px;}
  .gear{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .gear:hover{background:var(--green-light);}

  .datebar{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px 10px;margin-bottom:14px;flex-wrap:wrap;}
  .datebar button.nav{border:none;background:var(--green-light);color:var(--green-dark);width:32px;height:32px;border-radius:9px;font-size:15px;cursor:pointer;font-weight:700;}
  .datebar .today-btn{border:1px solid var(--border);background:#fff;border-radius:9px;padding:0 10px;height:32px;font-size:12px;cursor:pointer;color:var(--ink);font-weight:600;}
  .datebar .datelabel{font-weight:800;font-size:15px;flex:1;text-align:center;min-width:120px;}
  .datebar .datelabel .wd{color:var(--coral);}
  .datebar input[type=date]{border:1px solid var(--border);border-radius:9px;padding:5px 6px;font-size:12px;color:var(--muted);background:#fff;}

  .panel{background:var(--amber-light);border:1px solid #EBD9A5;border-radius:14px;padding:14px;margin-bottom:14px;}
  .panel.db-panel{background:var(--blue-light);border-color:#C7D6F0;}
  .panel h3{margin:0 0 8px;font-size:13px;color:var(--ink);}
  .settings-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .settings-grid label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;}
  .settings-grid input{width:100%;padding:7px 8px;border-radius:8px;border:1px solid var(--border);font-size:13px;}
  .save-btn{margin-top:10px;background:var(--green);color:#fff;border:none;border-radius:9px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;}
  .hint{font-size:10.5px;color:var(--muted);margin-top:8px;line-height:1.5;}

  .db-columns{display:flex;gap:14px;flex-wrap:wrap;}
  .db-col{flex:1;min-width:260px;background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;}
  .db-col-title{font-weight:800;font-size:12.5px;margin-bottom:8px;display:flex;justify-content:space-between;}
  .db-add-row{display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;}
  .db-add-row input[type=text]{flex:1;padding:6px 7px;border-radius:7px;border:1px solid var(--border);font-size:12px;min-width:90px;}
  .db-add-row input[type=number]{width:64px;padding:6px 5px;border-radius:7px;border:1px solid var(--border);font-size:12px;}
  .db-add-row input.macro-in{width:52px;}
  .db-add-row button{background:var(--blue-dark);color:#fff;border:none;border-radius:7px;padding:0 10px;font-size:12px;font-weight:700;cursor:pointer;}
  .db-col-hint{font-size:10px;color:var(--muted);margin:-4px 0 6px;}
  .db-list{max-height:230px;overflow-y:auto;border-top:1px dashed var(--border);padding-top:4px;}
  .db-list::-webkit-scrollbar{width:6px;}
  .db-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .db-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px dashed var(--border);}
  .db-row:last-child{border-bottom:none;}
  .db-row .dname{flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .db-row input[type=number]{width:56px;padding:4px 5px;border-radius:6px;border:1px solid var(--border);font-size:11.5px;text-align:right;}
  .db-row input.macro-in{width:40px;}
  .db-row .u{font-size:10.5px;color:var(--muted);}
  .db-row .del{border:none;background:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;}
  .db-row .del:hover{color:var(--coral);}
  .db-empty{font-size:11.5px;color:var(--muted);padding:6px 0;}

  .sum-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 10px;text-align:center;}
  .sum-card .lbl{font-size:11px;color:var(--muted);margin-bottom:4px;}
  .sum-card .val{font-size:20px;font-weight:800;font-variant-numeric:tabular-nums;}
  .sum-card.net-neg{background:var(--green-light);}
  .sum-card.net-neg .val{color:var(--green-dark);}
  .sum-card.net-pos{background:var(--coral-light);}
  .sum-card.net-pos .val{color:var(--coral);}
  .sum-card .sub{font-size:10px;color:var(--muted);margin-top:2px;}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
  .card h2{font-size:14px;margin:0 0 10px;display:flex;align-items:center;gap:6px;}
  .meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .add-row{display:flex;gap:6px;margin-bottom:8px;}

  .add-row button{background:var(--green);color:#fff;border:none;border-radius:8px;padding:0 12px;font-size:12.5px;cursor:pointer;font-weight:700;white-space:nowrap;}
  .item-row{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px dashed var(--border);}

  .item-row .src-db{background:var(--green-light);color:var(--green-dark);}
  .item-row .src-manual{background:var(--coral-light);color:var(--coral);}

  .sync-card .status-dot.on{background:var(--green);}
  .sync-card .sync-text{flex:1;min-width:180px;font-size:12px;color:var(--muted);}
  .sync-btn{background:var(--blue-dark);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;white-space:nowrap;}

  .sync-btn.secondary{background:#fff;color:var(--blue-dark);border:1px solid var(--blue-dark);}
  .sync-btn.logout{background:#fff;color:var(--coral);border:1px solid var(--coral);}

  .goal-card{background:linear-gradient(135deg, var(--green-light), #fff);border:1px solid var(--green);}
  .goal-card .goal-empty-btn{background:var(--green);color:#fff;border:none;border-radius:9px;padding:8px 14px;font-size:12.5px;font-weight:700;cursor:pointer;}
  .goal-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:8px;}
  .goal-stat{flex:1;min-width:130px;}

  .goal-stat .gv{font-size:14px;font-weight:800;color:var(--green-dark);}
  .goal-dday{display:inline-block;background:var(--green);color:#fff;font-size:11px;font-weight:800;padding:2px 9px;border-radius:20px;margin-left:6px;}
  .goal-dday.ended{background:var(--coral);}

  .water-row{display:flex;gap:10px;flex-wrap:wrap;}

  .water-box .wu{font-size:10.5px;color:var(--muted);margin-left:4px;}

  .macro-seg{height:100%;}
  .macro-seg.carb{background:#5B9BD5;}
  .macro-seg.fat{background:#ED9D5D;}
  .macro-seg.protein{background:#7EBF7E;}
  .macro-legend{display:flex;gap:14px;margin-top:8px;font-size:11px;color:var(--muted);flex-wrap:wrap;}
  .macro-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:4px;vertical-align:middle;}

</style>
</head>

function normalizeName(s){
  return String(s).replace(/\([^)]*\)/g,'').replace(/[0-9]+(\.[0-9]+)?/g,'')
    .replace(/(개|병|컵|봉지|인분|마리|잔|조각|공기|그램|밀리리터|시간|시|분|초|km|킬로미터|걸음|바퀴|회|세트|홀|g|ml|kg|팩|캔|접시)/g,'')
    .replace(/\s+/g,'').toLowerCase();
}
function findInDB(list, text){
  const norm = normalizeName(text);
  if(!norm) return null;
  for(const item of list){ if(normalizeName(item.name)===norm) return item; }
  let best=null, bestLen=0;
  for(const item of list){
    const dnorm = normalizeName(item.name);
    if(dnorm.length>=2 && (norm.includes(dnorm) || dnorm.includes(norm))){
      if(dnorm.length>bestLen){ best=item; bestLen=dnorm.length; }
    }
  }
  return best;
}

}

function mondayOf(d){ const date=new Date(d); const day=date.getDay(); const diff=(day+6)%7; date.setDate(date.getDate()-diff); date.setHours(0,0,0,0); return date; }

function computeTotals(log, settings){
  const mealSum = arr => (arr||[]).reduce((s,i)=>s+(Number(i.kcal)||0),0);
  const macroSum = (arr, field) => (arr||[]).reduce((s,i)=>s+(Number(i[field])||0),0);
  const intake = MEAL_TYPES.reduce((s,m)=>s+mealSum(log.meals[m.key]),0);
  const carb = MEAL_TYPES.reduce((s,m)=>s+macroSum(log.meals[m.key],'carb'),0);
  const fat = MEAL_TYPES.reduce((s,m)=>s+macroSum(log.meals[m.key],'fat'),0);
  const protein = MEAL_TYPES.reduce((s,m)=>s+macroSum(log.meals[m.key],'protein'),0);
  const exerciseBurn = (log.exercises||[]).reduce((s,i)=>s+(Number(i.kcal)||0),0);
  const stepsBurn = Math.round((log.steps||0) * settings.stepsKcalFactor);
  const burn = exerciseBurn + stepsBurn + Number(settings.activityBaseline||0);
  const net = intake - burn;
  const water = log.water || {morning:0,afternoon:0,evening:0};
  const waterTotal = (Number(water.morning)||0) + (Number(water.afternoon)||0) + (Number(water.evening)||0);
  return { intake, carb, fat, protein, exerciseBurn, stepsBurn, burn, net, waterTotal };
}
function hasAnyData(log){
  const w = log.water || {};
  const waterSum = (Number(w.morning)||0)+(Number(w.afternoon)||0)+(Number(w.evening)||0);
  return (log.steps>0) || MEAL_TYPES.some(m=>(log.meals[m.key]||[]).length>0) || (log.exercises||[]).length>0 || waterSum>0;
}
function loadWeekData(refDate, settings){
  const monday = mondayOf(refDate);
  const days = [];
  for(let i=0;i<7;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    const key = dateKey(d);
    const log = loadLog(key);
    days.push({ date:d, key, weekday:WD[d.getDay()], totals: computeTotals(log, settings), hasData: hasAnyData(log), weightMorning: log.weightMorning, waistCm: log.waistCm });
  }
  return days;
}
function loadBodyHistory(){
  const keys = storageListPrefix('log:');
  const entries = [];
  for(const k of keys){
    const v = storageGet(k);
    if(!v) continue;
    try{
      const p = JSON.parse(v);
      const hasW = p.weightMorning===0 || p.weightMorning;
      const hasWa = p.waistCm===0 || p.waistCm;
      if(hasW || hasWa){ entries.push({ date: k.slice(4), weight: hasW?Number(p.weightMorning):null, waist: hasWa?Number(p.waistCm):null }); }
    }catch(e){}
  }
  entries.sort((a,b)=> a.date<b.date?-1:(a.date>b.date?1:0));
  return entries;
}

function computeGoalDerived(goal){
  if(!goal || !goal.startDate || !goal.startWeight || !goal.targetWeight || !goal.periodValue) return null;
  const periodDays = Math.round(goal.periodUnit==='months' ? goal.periodValue*30 : goal.periodValue*7);
  if(periodDays<=0) return null;
  const periodWeeks = periodDays/7;
  const start = new Date(goal.startDate+'T00:00:00');
  const end = new Date(start); end.setDate(end.getDate()+periodDays);
  const totalKg = goal.startWeight - goal.targetWeight;
  const totalCal = -(totalKg*7700);
  const weeklyKg = totalKg/periodWeeks;
  const weeklyCal = totalCal/periodWeeks;
  const waistTotal = (goal.startWaist!=null && goal.targetWaist!=null) ? (goal.startWaist-goal.targetWaist) : null;
  const today = new Date(); today.setHours(0,0,0,0);
  const daysElapsed = Math.floor((today-start)/86400000);
  const daysLeft = periodDays - daysElapsed;
  return { periodDays, periodWeeks, start, end, totalKg, totalCal, weeklyKg, weeklyCal, waistTotal, daysElapsed, daysLeft };
}

/* ---------------- Google Drive 동기화 ---------------- */
let tokenClient = null;

function ensureTokenClient(){
  if(tokenClient) return tokenClient;
  if(!(window.google && window.google.accounts && window.google.accounts.oauth2)) return null;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: GOOGLE_CLIENT_ID,
    scope: DRIVE_SCOPE,
    callback: (resp) => {
      if(resp.error){ state.errorMsg = 'Google 로그인에 실패했어요: '+resp.error; render(); return; }
      state.accessToken = resp.access_token;
      driveSyncAfterLogin();
    },
  });
  return tokenClient;
}
function driveLogin(){
  const tc = ensureTokenClient();
  if(!tc){ state.errorMsg = 'Google 로그인 준비 중이에요. 잠시 후 다시 눌러주세요.'; render(); return; }
  state.errorMsg = null;
  tc.requestAccessToken();
}
function driveLogout(){
  try{ if(state.accessToken && window.google) google.accounts.oauth2.revoke(state.accessToken, ()=>{}); }catch(e){}
  state.accessToken = null; state.driveSignedIn = false; state.driveFileId = null;
  render();
}

async function driveFetch(url, options){
  const opts = options || {};
  opts.headers = Object.assign({ 'Authorization': 'Bearer '+state.accessToken }, opts.headers||{});
  const res = await fetch(url, opts);
  if(res.status === 401){
    state.driveSignedIn = false;
    state.accessToken = null;
    throw new Error('AUTH_EXPIRED');
  }
  return res;
}

async function driveFindFile(){
  const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files?q=${q}&spaces=drive&fields=files(id,name)`);
  const data = await res.json();
  return (data.files && data.files[0]) ? data.files[0].id : null;
}
async function driveGetContent(fileId){
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  return await res.json();
}
async function driveCreateFile(contentObj){
  const boundary = 'calorietracker_boundary_'+Date.now();
  const metadata = { name: DRIVE_FILE_NAME, mimeType: 'application/json' };
  const body =
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(metadata)}\r\n` +
    `--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(contentObj)}\r\n` +
    `--${boundary}--`;
  const res = await driveFetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
    method: 'POST',
    headers: { 'Content-Type': `multipart/related; boundary=${boundary}` },
    body,
  });
  const data = await res.json();
  return data.id;
}
async function driveUpdateFile(fileId, contentObj){
  await driveFetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(contentObj),
  });
}

function gatherAllData(){
  const logs = {};
  for(const k of storageListPrefix('log:')){
    const v = storageGet(k);
    if(v){ try{ logs[k.slice(4)] = JSON.parse(v); }catch(e){} }
  }
  return { settings: state.settings, foodDB: state.foodDB, exerciseDB: state.exerciseDB, goal: state.goal, logs };
}
function applyAllData(blob){
  if(!blob) return;
  if(blob.settings) storageSet('settings', JSON.stringify(blob.settings));
  if(blob.foodDB) storageSet('foodDB', JSON.stringify(blob.foodDB));
  if(blob.exerciseDB) storageSet('exerciseDB', JSON.stringify(blob.exerciseDB));
  if(blob.goal) storageSet('goal', JSON.stringify(blob.goal));
  if(blob.logs){ for(const d in blob.logs){ storageSet('log:'+d, JSON.stringify(blob.logs[d])); } }
}

async function driveSyncAfterLogin(){
  state.driveSyncing = true; render();
  try{
    let fileId = storageGet('driveFileId') || (await driveFindFile());
    if(fileId){
      const remote = await driveGetContent(fileId);
      applyAllData(remote);
    } else {
      fileId = await driveCreateFile(gatherAllData());
    }
    storageSet('driveFileId', fileId);
    state.driveFileId = fileId;
    state.driveSignedIn = true;
    state.settings = loadSettings();
    state.foodDB = loadOrSeedDB('foodDB', FOOD_DB_SEED);
  if(migrateFoodDBMacros(state.foodDB)) saveDB('food');
    state.exerciseDB = loadOrSeedDB('exerciseDB', EXERCISE_DB_SEED);
    state.goal = loadGoal();
    refreshDay();
    state.errorMsg = null;
  }catch(e){
    console.error(e);
    state.driveSignedIn = false;
    state.errorMsg = (e.message==='AUTH_EXPIRED')
      ? '로그인이 만료됐어요. 다시 로그인해주세요.'
      : 'Google 드라이브 동기화 중 오류가 발생했어요. 다시 시도해주세요.';
  }
  state.driveSyncing = false;
  render();
}
async function driveManualRefresh(){
  if(!state.driveSignedIn || !state.driveFileId) return;
  state.driveSyncing = true; render();
  try{
    const remote = await driveGetContent(state.driveFileId);
    applyAllData(remote);
    state.settings = loadSettings();
    state.foodDB = loadOrSeedDB('foodDB', FOOD_DB_SEED);
  if(migrateFoodDBMacros(state.foodDB)) saveDB('food');
    state.exerciseDB = loadOrSeedDB('exerciseDB', EXERCISE_DB_SEED);
    state.goal = loadGoal();

  }catch(e){

function metricChartSVG(history, field, color){
  const pts = history.filter(e=>e[field]!=null);
  if(pts.length<2) return '';
  const W=300,H=60,PAD=10;
  const vals = pts.map(p=>p[field]);
  const min=Math.min(...vals), max=Math.max(...vals);
  const range=(max-min)||1;
  const stepX=(W-2*PAD)/(pts.length-1);
  const coords = pts.map((p,i)=>({x:PAD+i*stepX, y:PAD+(1-(p[field]-min)/range)*(H-2*PAD)}));
  const poly = coords.map(c=>`${c.x.toFixed(1)},${c.y.toFixed(1)}`).join(' ');
  const circles = coords.map((c,i)=>`<circle cx="${c.x.toFixed(1)}" cy="${c.y.toFixed(1)}" r="${i===coords.length-1?3.5:2}" fill="${i===coords.length-1?'#DD7A56':color}"/>`).join('');
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;margin-top:6px;"><polyline points="${poly}" fill="none" stroke="${color}" stroke-width="2"/>${circles}</svg>`;
}
function metricStatsHTML(history, field, unit, label){
  const pts = history.filter(e=>e[field]!=null);
  if(pts.length===0) return `<div class="activity-box"><div class="lbl">${label}</div><div class="empty-note">아직 기록이 없어요.</div></div>`;
  const start = pts[0][field], latest = pts[pts.length-1][field];
  const delta = latest-start;
  const cls = delta<0?'net-neg':(delta>0?'net-pos':'');
  return `<div class="activity-box">
    <div class="lbl">${label} (총 ${pts.length}회)</div>
    <div style="font-size:13px;">시작 <b>${start}${unit}</b> → 최근 <b>${latest}${unit}</b></div>
    <div class="${cls}" style="font-size:15px;font-weight:800;margin-top:2px;">${delta>0?'+':''}${delta.toFixed(1)}${unit}</div>
  </div>`;
}

      `}
    </div>

    <div class="card">
      <h2>⚖️ 오늘 아침 체중 &amp; 허리둘레</h2>
      <div class="activity-row">
        <div class="activity-box" style="flex:0 0 auto;min-width:130px;">
          <div class="lbl">체중(kg)</div>
          <input type="number" step="0.1" min="0" placeholder="예: 75.4" value="${state.currentLog.weightMorning ?? ''}" onchange="updateWeight(this.value)">
        </div>
        <div class="activity-box" style="flex:0 0 auto;min-width:130px;">
          <div class="lbl">허리둘레(cm)</div>
          <input type="number" step="0.1" min="0" placeholder="예: 88.0" value="${state.currentLog.waistCm ?? ''}" onchange="updateWaist(this.value)">
        </div>
      </div>
      <div class="activity-row" style="margin-top:8px;">
        ${metricStatsHTML(state.bodyHistory,'weight','kg','📉 체중 변화')}
        ${metricStatsHTML(state.bodyHistory,'waist','cm','📏 허리둘레 변화')}
      </div>
      ${metricChartSVG(state.bodyHistory,'weight','#2F6F4E')}
      ${metricChartSVG(state.bodyHistory,'waist','#3457A6')}
    </div>

    ${waterCardHTML(totals)}

    <div class="summary-grid">
      <div class="sum-card"><div class="lbl">🍽 흡수 칼로리</div><div class="val">${totals.intake}</div><div class="sub">식사 총합</div></div>
      <div class="sum-card"><div class="lbl">🔥 소비 칼로리</div><div class="val">${totals.burn}</div><div class="sub">운동+걸음+활동대사</div></div>
      <div class="sum-card ${netClass}"><div class="lbl">⚖️ 잔여 칼로리</div><div class="val">${totals.net>0?'+':''}${totals.net}</div><div class="sub">${totals.net<0?'↓ 감소 방향':'↑ 적자 아님'}</div></div>
    </div>

    ${nutritionCardHTML(totals)}

    <div class="card">
      <h2>🍽 오늘의 식사</h2>
      <div class="meal-grid">${MEAL_TYPES.map(m=>mealBoxHTML(m)).join('')}</div>
    </div>

    <div class="card">
      <h2>🏃 운동 &amp; 활동</h2>
      ${exerciseBoxHTML()}
      <div class="activity-row">
        <div class="activity-box">
          <div class="lbl">🚶 오늘 걸음수</div>
          <div class="row2">
            <input type="number" min="0" step="100" value="${state.currentLog.steps}" onchange="updateSteps(this.value)">
            <span class="kcal-out">≈ ${totals.stepsBurn} kcal</span>
          </div>
        </div>
        <div class="activity-box">
          <div class="lbl">🧍 활동대사 (기초대사+비운동)</div>
          <div class="baseline-static">${s.activityBaseline} kcal</div>
          <div class="baseline-note">설정(⚙️)에서 조정할 수 있어요</div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>📅 이번 주 현황 <span style="font-weight:400;color:var(--muted);font-size:11.5px;">(${loggedDays.length}/7일 입력됨)</span></h2>
      <table class="week">
        <thead><tr><th>요일</th><th>날짜</th><th>흡수</th><th>소비</th><th>잔여</th><th>체중</th><th>허리</th></tr></thead>
        <tbody>${weekTableRows()}</tbody>
      </table>
      ${loggedDays.length>0 ? `
      <div class="progress-wrap">
        <div class="progress-label"><span>🔥 칼로리 목표 달성률</span><b>${calPct}%</b></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,calPct))}%"></div></div>
        <div class="progress-label"><span>⚖️ 예상 감량 달성률</span><b>${kgPct}% (${kgLoss.toFixed(2)}kg / 목표 ${weeklyKgTarget.toFixed(2)}kg)</b></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.max(0,Math.min(100,kgPct))}%"></div></div>
        <div class="week-footer-note">주간 잔여 칼로리 합계: ${weeklyNet} kcal (목표 ${Math.round(weeklyCalTarget)} kcal 대비, 입력된 ${loggedDays.length}일 기준)${!goalDerived?' · <span style="color:var(--coral);">🎯에서 목표를 설정하면 내 목표 기준으로 계산돼요 (지금은 예시값)</span>':''}</div>
      </div>` : `<div class="empty-note" style="margin-top:10px;">이번 주에 아직 입력된 날이 없어요.</div>`}
    </div>

    <div class="storage-note">💾 이 브라우저(기기)에는 항상 자동 저장돼요.${state.driveSignedIn ? ' Google 드라이브에도 실시간으로 백업/동기화되고 있어요.' : ' 위의 "Google로 동기화 시작"을 누르면 다른 기기와도 데이터를 공유할 수 있어요.'}<br>⚠️ Google 로그인은 이 페이지를 새로 열 때마다 다시 눌러줘야 해요 (보안상 로그인 상태가 유지되지 않아요).</div>
  `;
}

/* ---------------- 초기화 ---------------- */
function init(){
  state.settings = loadSettings();
  state.foodDB = loadOrSeedDB('foodDB', FOOD_DB_SEED);
  if(migrateFoodDBMacros(state.foodDB)) saveDB('food');
  state.exerciseDB = loadOrSeedDB('exerciseDB', EXERCISE_DB_SEED);
  state.goal = loadGoal();
  refreshDay();
  render();
}
init();
</script>
</body>
</html>
